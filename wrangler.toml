name = "crochetty"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[[r2_buckets]]
binding = "R2"
bucket_name = "crochetty-media"

[[kv_namespaces]]
binding = "NEXT_INC_CACHE_KV"
id = "df5e59c6bb8b4fdab2d8310bf5f86197"
preview_id = "e9c66637a2344443a79c3aa5b9536e4b"

# Note: NEXT_PUBLIC_* variables are inlined at build time by Next.js and cannot
# be set at runtime via wrangler.toml [vars]. Set NEXT_PUBLIC_APP_URL in
# .env.production before running `next build` (or `opennextjs-cloudflare build`).
[vars]

# Secrets — set via: wrangler secret put <NAME>
# DATABASE_URL
# BETTER_AUTH_SECRET
# MOLLIE_API_KEY
# RESEND_API_KEY
# GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
# FACEBOOK_CLIENT_ID / FACEBOOK_CLIENT_SECRET
# APPLE_CLIENT_ID / APPLE_CLIENT_SECRET
